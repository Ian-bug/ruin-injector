[changelog]
# changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
# template for changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}

    [Full Changelog](https://github.com/Ian-bug/ruin-injector/compare/{{ previous_version | default(value="") }}...{{ version | trim_start_matches(pat="v") }}) | [Downloads](https://github.com/Ian-bug/ruin-injector/releases/tag/{{ version | trim_start_matches(pat="v") }})

{% else %}\
    ## [Unreleased]

    **Full Changelog**: [master...HEAD](https://github.com/Ian-bug/ruin-injector/compare/master...HEAD)

{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}

    ### {{ group | striptags | trim | upper_first }}

    {% for commit in commits %}

        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} ⚠️ **[BREAKING]**{% endif %}

    {% endfor %}

{% endfor %}

---

"""
# remove leading and trailing whitespace from the template
trim = true
# changelog footer
footer = """
<!-- generated by git-cliff -->
"""

[git]
# parse the commits based on conventional commits
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# process each line of a commit as an individual commit
split_commits_by_newline = false

# regex for preprocessing commit messages
commit_preprocessors = [
    # remove issue numbers from commit message
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]

# regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "✨ Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^doc", group = "📚 Documentation" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refactor" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^test", group = "✅ Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore", group = "🔧 Miscellaneous Tasks" },
    { message = "^ci", group = "👷 CI/CD" },
    { body = ".*security", group = "🔒 Security" },
]

# protect breaking changes from being skipped due to matching a commits parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit parsers
filter_commits = false
# glob pattern for matching git tags
tag_pattern = "v[0-9]*"
# sort tags topologically
topo_order = false
# sort commits inside sections by date, then by scope, then by message
sort_commits = "oldest"
